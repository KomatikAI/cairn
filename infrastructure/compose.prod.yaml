# Production override: bind internal services to localhost only
# Use alongside compose.yaml and seed-specific compose.override.yaml
#
# Usage:
#   docker compose --project-directory infrastructure \
#     -f infrastructure/compose.yaml \
#     -f seeds/001-energy/config/compose.override.yaml \
#     -f infrastructure/compose.prod.yaml \
#     up -d

services:
  bifrost:
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:9090:9090"

  gateway:
    ports:
      - "127.0.0.1:18789:18789"

  db:
    ports:
      - "127.0.0.1:5432:5432"
